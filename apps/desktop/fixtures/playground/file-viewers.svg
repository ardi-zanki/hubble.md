<svg xmlns="http://www.w3.org/2000/svg" width="480" height="280" viewBox="0 0 480 280" font-family="system-ui, sans-serif">
  <rect width="480" height="280" rx="12" fill="#f4f1ea"/>
  <text x="240" y="42" text-anchor="middle" font-size="20" font-weight="600" fill="#2f4536">Hubble file viewers</text>

  <rect x="40" y="70" width="120" height="64" rx="8" fill="#2f4536"/>

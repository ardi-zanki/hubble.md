name: Desktop Release

on:
  push:
    tags:
      - "desktop-v*"

jobs:
  prepare-release:
    name: Prepare GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify tag matches desktop version
        run: |
          VERSION="$(node -p "require('./apps/desktop/package.json').version")"
          TAG="${GITHUB_REF_NAME#desktop-v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "Tag desktop-v$TAG does not match apps/desktop package version $VERSION"
            exit 1
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#desktop-v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { flag=1; next }
            /^## / && flag { flag=0 }
            flag { print }
          ' CHANGELOG.md | sed -e '/./,$!d' > notes.md

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            if [ -s notes.md ]; then
              gh release edit "$GITHUB_REF_NAME" --notes-file notes.md --draft=false --latest
            else
              gh release edit "$GITHUB_REF_NAME" --draft=false --latest
            fi
          elif [ -s notes.md ]; then
            gh release create "$GITHUB_REF_NAME" --verify-tag --title "$GITHUB_REF_NAME" --notes-file notes.md --latest
          else
            gh release create "$GITHUB_REF_NAME" --verify-tag --title "$GITHUB_REF_NAME" --generate-notes --latest
          fi
  release-macos:
    name: Build and publish desktop app (macOS)
    needs: prepare-release
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches desktop version
        run: |
          VERSION="$(node -p "require('./apps/desktop/package.json').version")"
          TAG="${GITHUB_REF_NAME#desktop-v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "Tag desktop-v$TAG does not match apps/desktop package version $VERSION"
            exit 1
          fi

      - name: Build and publish release
        env:
          GH_TOKEN: ${{ github.token }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          pnpm --filter @hubble.md/desktop... --if-present build
          if [ -z "$CSC_LINK" ]; then
            unset CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          pnpm --filter @hubble.md/desktop exec electron-builder --mac --publish always

  release-linux:
    name: Build and publish desktop app (Linux ${{ matrix.arch }})
    needs: prepare-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install rpmbuild
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Verify tag matches desktop version
        run: |
          VERSION="$(node -p "require('./apps/desktop/package.json').version")"
          TAG="${GITHUB_REF_NAME#desktop-v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "Tag desktop-v$TAG does not match apps/desktop package version $VERSION"
            exit 1
          fi

      - name: Build and publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pnpm --filter @hubble.md/desktop... --if-present build
          pnpm --filter @hubble.md/desktop exec electron-builder --linux --${{ matrix.arch }} --publish always

  release-windows:
    name: Build and publish desktop app (Windows ${{ matrix.arch }})
    needs: prepare-release
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x64
          - arm64
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches desktop version
        shell: bash
        run: |
          VERSION="$(node -p "require('./apps/desktop/package.json').version")"
          TAG="${GITHUB_REF_NAME#desktop-v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "Tag desktop-v$TAG does not match apps/desktop package version $VERSION"
            exit 1
          fi

      - name: Build and publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pnpm --filter @hubble.md/desktop... --if-present build
          pnpm --filter @hubble.md/desktop exec electron-builder --win --${{ matrix.arch }} --publish always

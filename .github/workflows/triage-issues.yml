name: Triage New Issues

# Guarantees every newly opened issue carries a readiness label, then triages
# it with an Oz cloud agent when possible.
#
# Flow:
# 1. `seed` always applies `needs-triage` if the issue has no readiness label.
#    This covers blank issues, API/CLI creates, and template misses — so agent
#    failure still leaves the issue in a known inbox state.
# 2. `triage` runs the read-only triage skill and emits structured JSON.
# 3. `apply` replaces `needs-triage` with the agent's readiness label and posts
#    the triage comment. If triage/apply fail, the seeded `needs-triage` remains.
# 4. `implement` starts Implement Ready Issues when the applied label is ready-to-implement.
#
# Setup: the WARP_API_KEY repository secret must be set (the Oz API key).

on:
  issues:
    types: [opened]

# Avoid duplicate triage runs if the same issue fires overlapping events.
concurrency:
  group: triage-issue-${{ github.event.issue.number }}
  cancel-in-progress: true

env:
  # Exactly one of these should be present on every open issue after triage
  # (or after seed, if triage has not finished yet).
  READINESS_LABELS: needs-triage,ready-to-implement,needs-discussion,wontfix

jobs:
  seed:
    name: Seed needs-triage
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Ensure a readiness label exists
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          EXISTING_LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
        run: |
          set -euo pipefail

          IFS=',' read -r -a readiness <<< "$READINESS_LABELS"
          IFS=',' read -r -a existing <<< "${EXISTING_LABELS:-}"

          has_readiness=false
          for label in "${existing[@]}"; do
            [ -z "$label" ] && continue
            for ready in "${readiness[@]}"; do
              if [ "$label" = "$ready" ]; then
                has_readiness=true
                break 2
              fi
            done
          done

          if [ "$has_readiness" = true ]; then
            echo "Issue already has a readiness label; leaving labels unchanged."
            exit 0
          fi

          echo "No readiness label present; applying needs-triage."
          gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --add-label "needs-triage"

  triage:
    name: Triage issue
    needs: seed
    runs-on: ubuntu-latest
    permissions:
      contents: read # let the agent inspect the checked-out codebase
      issues: read # let the agent read the issue/comments/labels — never write
    outputs:
      triage_result: ${{ steps.triage.outputs.agent_output }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Triage with Oz agent
        uses: warpdotdev/oz-agent-action@v1
        id: triage
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          skill: triage
          name: "Triage issue #${{ github.event.issue.number }}"
          prompt: |
            Triage GitHub issue #${{ github.event.issue.number }} in this
            repository using the triage skill.

            - Repository: ${{ github.repository }}
            - Issue URL: ${{ github.event.issue.html_url }}

            Return the JSON result the skill specifies as your final response;
            the apply job applies the label and comment from it.
          warp_api_key: ${{ secrets.WARP_API_KEY }}
          profile: ${{ vars.WARP_AGENT_PROFILE || '' }}

  apply:
    name: Apply triage result
    needs: triage
    if: needs.triage.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    outputs:
      label: ${{ steps.apply.outputs.label }}
    steps:
      - name: Apply label and comment
        id: apply
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          TRIAGE_RESULT: ${{ needs.triage.outputs.triage_result }}
        run: |
          set -euo pipefail

          if [ -z "${TRIAGE_RESULT:-}" ]; then
            echo "::error::Triage job produced no output; keeping seeded needs-triage." >&2
            exit 1
          fi

          # The action returns the agent's full final response, which may
          # include prose around the JSON. Extract the last triage-result
          # object (the one carrying "state"/"label") into triage_result.json.
          printf '%s' "$TRIAGE_RESULT" > raw_output.txt
          if ! python3 - raw_output.txt > triage_result.json <<'PY'
          import json, sys

          text = open(sys.argv[1], encoding="utf-8").read()
          decoder = json.JSONDecoder()
          last_obj = last_triage = None
          for i, ch in enumerate(text):
              if ch != "{":
                  continue
              try:
                  obj, _ = decoder.raw_decode(text[i:])
              except json.JSONDecodeError:
                  continue
              if isinstance(obj, dict):
                  last_obj = obj
                  if "state" in obj and "label" in obj:
                      last_triage = obj
          result = last_triage if last_triage is not None else last_obj
          if result is None:
              sys.exit(1)
          json.dump(result, sys.stdout)
          PY
          then
            echo "::error::Could not find a JSON object in the agent output; keeping seeded needs-triage. Raw output:" >&2
            cat raw_output.txt >&2
            exit 1
          fi

          STATE="$(jq -r '.state // ""' triage_result.json)"
          LABEL="$(jq -r '.label // ""' triage_result.json)"

          # Require the structured fields the apply step needs. The set of valid
          # states/labels is owned by the triage skill, so it is intentionally
          # not duplicated here.
          if [ -z "$STATE" ]; then
            echo "::error::Triage result is missing a 'state'; keeping seeded needs-triage." >&2
            exit 1
          fi

          if [ -z "$LABEL" ]; then
            echo "::error::Triage result is missing a 'label' to apply; keeping seeded needs-triage." >&2
            exit 1
          fi

          echo "Triage state: $STATE"
          echo "Applying label: $LABEL"
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"

          # Always clear other readiness labels so exactly one remains after apply.
          # Agent-listed remove_labels are applied first; then every readiness
          # label other than the chosen one is removed as a safety net.
          while IFS= read -r remove_label; do
            [ -z "$remove_label" ] && continue
            echo "Removing label: $remove_label"
            gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --remove-label "$remove_label" || true
          done < <(jq -r '(.remove_labels // [])[]' triage_result.json)

          IFS=',' read -r -a readiness <<< "$READINESS_LABELS"
          for ready in "${readiness[@]}"; do
            if [ "$ready" != "$LABEL" ]; then
              echo "Ensuring readiness label removed: $ready"
              gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --remove-label "$ready" || true
            fi
          done

          # Apply the chosen triage-state label to the triggering issue only.
          gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --add-label "$LABEL"

          # Post the triage comment to the triggering issue only.
          jq -r '.comment // ""' triage_result.json > comment.md
          if [ -s comment.md ]; then
            gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body-file comment.md
          else
            echo "No comment body provided by triage result; skipping comment."
          fi

  # GitHub prevents workflows from triggering other workflows simply by applying labels.
  # i.e. when triage applies `ready-to-implement`, GitHub won't allow another workflow to respond.
  # This supposedly prevents infinite workflow trigger loops.
  # Run the implement workflow manually.
  implement:
    name: Implement ready issue
    needs: apply
    if: needs.apply.outputs.label == 'ready-to-implement'
    permissions:
      contents: write
      issues: read
      pull-requests: write
    uses: ./.github/workflows/implement-ready-issues.yml
    with:
      issue_number: ${{ github.event.issue.number }}
    secrets: inherit
